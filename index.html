<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<style>
*{margin:0;padding:0}
body{background:#080A0F;color:#fff;font-family:'Courier New',monospace;width:1280px;font-size:14px}

/* switcher */
#sw{background:#0D0F18;border-bottom:2px solid #1A1D27;padding:8px 14px}
#sw span{color:#444;font-size:13px;margin-right:8px}
.sb{background:#1A1D27;color:#666;border:none;border-radius:6px;padding:5px 14px;cursor:pointer;font-weight:700;font-size:12px;font-family:'Courier New',monospace;margin-right:5px}
.sb.on{background:#F7A84F;color:#000}

/* header */
#hdr{width:100%;border-collapse:collapse;border-bottom:1px solid #0F1118}
#hdr td{padding:14px 28px 10px;vertical-align:middle}
#stitle{color:#F7A84F;font-size:44px;font-weight:900;letter-spacing:4px}
#ssub{color:#1A1D2A;font-size:11px;letter-spacing:3px;margin-top:4px}
#clock{color:#fff;font-size:56px;font-weight:900;text-align:right}
#xdate{color:#2A2D3A;font-size:12px;text-align:right;margin-top:2px}

/* two column layout */
#layout{width:1280px;border-collapse:collapse;table-layout:fixed}
#layout td.col{width:640px;vertical-align:top;padding:12px 16px}
#layout td.col-r{border-left:1px solid #222530}
.card{width:100%;border-collapse:collapse;table-layout:fixed}
.wcard{width:100%;border-collapse:collapse;table-layout:fixed}

/* active card using table */
.card{width:100%;border-collapse:collapse;margin-bottom:8px;border-radius:10px}
.card td{padding:10px 12px;vertical-align:middle}
.urg .card-wrap{background:#1C0808;border:2px solid #FF4444;border-radius:10px}
.top .card-wrap{background:#141828;border:1px solid #3A4060;border-radius:10px}
.nrm .card-wrap{background:#0F1220;border:1px solid #1E2438;border-radius:10px}
.card-wrap{margin-bottom:9px;padding:4px 0 10px}
.acc{width:4px;padding:0;background:#ccc;border-radius:3px 0 0 3px}
.cnum{width:36px;text-align:center;font-size:20px;color:#3A4060;font-weight:900;padding:8px 4px}
.cmain{padding:6px 8px}
.cdl{width:110px;text-align:right;padding:6px 12px 6px 4px;white-space:nowrap}
.bu{background:#FF444433;color:#FF4444;border:1px solid #FF444488;border-radius:4px;padding:1px 7px;font-size:11px;font-weight:900;display:inline-block;margin-bottom:3px}
.ci{color:#F7A84F;font-size:20px;font-weight:900;line-height:1.2}
.cm{color:#fff;font-size:16px;font-weight:700;margin-top:3px}
.cs{color:#4A5070;font-size:12px;margin-top:2px}
.dd{font-size:16px;font-weight:700}
.dy{font-size:12px;margin-top:2px}

/* waiting card */
.wcard-wrap{margin-bottom:8px;background:#141828;border:1px solid #2A3050;border-radius:8px;padding:10px 12px}
.wcard{width:100%;border-collapse:collapse;table-layout:fixed}
.wcard td{vertical-align:middle;padding:3px 4px}
.wo{width:24px;color:#4A5580;font-size:15px;text-align:center}
.wmain{padding:0 6px}
.wi{color:#6A7AAA;font-size:15px;font-weight:700}
.wm{color:#4A5580;font-size:13px;margin-top:2px}
.wf{color:#2A3558;font-size:11px;margin-top:2px}
.wdl{width:90px;text-align:right;color:#4A5580;font-size:12px;white-space:nowrap}

.divider{border-top:1px solid #2A3050;margin:4px 0 8px;padding-top:6px;color:#4A5580;font-size:11px;letter-spacing:2px}

#foot{text-align:right;padding:4px 20px}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#4FC9A4;margin-right:5px;vertical-align:middle}
#fl{color:#151A20;font-size:10px;letter-spacing:2px;vertical-align:middle}
</style>
</head>
<body>

<div id="sw">
  <span>ЭТАП:</span>
  <button class="sb on" onclick="go('saw',this)">Распиловка</button>
  <button class="sb" onclick="go('edge',this)">Кантовка</button>
  <button class="sb" onclick="go('cnc',this)">ЧПУ</button>
  <button class="sb" onclick="go('paint',this)">Малярка</button>
  <button class="sb" onclick="go('assembly',this)">Сборка</button>
  <button class="sb" onclick="go('packaging',this)">Упаковка</button>
</div>

<table id="hdr" width="100%">
<tr>
  <td><div id="stitle"></div><div id="ssub">ОЧЕРЕДЬ ИЗДЕЛИЙ</div></td>
  <td align="right"><div id="clock"></div><div id="xdate"></div></td>
</tr>
</table>

<table id="layout" width="100%">
<tr>
  <td class="col" id="col-left" width="50%"></td>
  <td class="col col-r" id="col-right" width="50%"></td>
</tr>
</table>

<div id="foot"><span class="dot"></span><span id="fl">MEBEL PRO · LIVE</span></div>

<script>
var ST={office:{l:'Офис'},constructor:{l:'Конструктор'},saw:{l:'Распиловка'},edge:{l:'Кантовка'},cnc:{l:'ЧПУ'},paint_after_saw:{l:'Малярка'},paint_after_cnc:{l:'Малярка'},assembly:{l:'Сборка'},packaging:{l:'Упаковка'},installer:{l:'Установка'},done:{l:'Готово'}};
var SO=['office','constructor','saw','paint_after_saw','edge','cnc','paint_after_cnc','assembly','packaging','installer','done'];
var OR=[
  {id:'ORD-2026-001',title:'Кухонный гарнитур + шкаф-купе',dl:'2026-05-10',urg:true},
  {id:'ORD-2026-002',title:'Офисные перегородки',dl:'2026-05-20',urg:false},
  {id:'ORD-2026-003',title:'Стеллажи 12 секций',dl:'2026-05-05',urg:false},
  {id:'ORD-2026-004',title:'Гардеробная система',dl:'2026-05-12',urg:false},
  {id:'ORD-2026-005',title:'Детская мебель',dl:'2026-05-03',urg:true}
];
var IT=[
  {id:'i1',oid:'ORD-2026-001',name:'Кухонный гарнитур нижний',stage:'saw'},
  {id:'i2',oid:'ORD-2026-001',name:'Шкаф-купе',stage:'saw'},
  {id:'i3',oid:'ORD-2026-002',name:'Перегородка секция A',stage:'constructor'},
  {id:'i4',oid:'ORD-2026-002',name:'Перегородка секция B',stage:'constructor'},
  {id:'i5',oid:'ORD-2026-003',name:'Стеллаж секции 1-4',stage:'constructor'},
  {id:'i6',oid:'ORD-2026-003',name:'Стеллаж секции 5-8',stage:'cnc'},
  {id:'i7',oid:'ORD-2026-003',name:'Стеллаж секции 9-12',stage:'assembly'},
  {id:'i8',oid:'ORD-2026-004',name:'Боковые секции',stage:'saw'},
  {id:'i9',oid:'ORD-2026-004',name:'Штанги и полки',stage:'constructor'},
  {id:'i10',oid:'ORD-2026-005',name:'Кровать детская',stage:'saw'},
  {id:'i11',oid:'ORD-2026-005',name:'Шкаф детский',stage:'office'}
];
var cur='saw';
function getO(id){for(var i=0;i<OR.length;i++)if(OR[i].id===id)return OR[i];return{title:'',dl:'',urg:false}}
function days(d){return Math.ceil((new Date(d)-new Date())/86400000)}
function isMine(it){return cur==='paint'?(it.stage==='paint_after_saw'||it.stage==='paint_after_cnc'):it.stage===cur}
function isComing(it){if(it.stage==='done'||isMine(it))return false;var mi=SO.indexOf(cur==='paint'?'paint_after_saw':cur),ci=SO.indexOf(it.stage);return mi>ci&&mi!==-1}
function go(s,btn){cur=s;var bs=document.querySelectorAll('.sb');for(var i=0;i<bs.length;i++)bs[i].className='sb';btn.className='sb on';render()}

function cardH(it,o,idx,isFirst){
  var d=days(o.dl),dc=d<0?'#FF4444':d<=3?'#FF8C00':'#4FC9A4',dt=d<0?'просрочено':d===0?'сегодня':d+' дн.';
  var ac=o.urg?'#FF4444':isFirst?'#F7A84F':'#1A1F2E';
  var cls=o.urg?'urg':isFirst?'top':'nrm';
  var num=o.urg?'!':(idx===0?'>':'#'+(idx+1));
  return '<div class="'+cls+'"><div class="card-wrap"><table class="card" width="100%"><tr>'
    +'<td class="acc" style="background:'+ac+'" width="4">&nbsp;</td>'
    +'<td class="cnum">'+num+'</td>'
    +'<td class="cmain">'+(o.urg?'<div class="bu">СРОЧНО</div>':'')+'<div class="ci">'+o.id+'</div><div class="cm">'+it.name+'</div><div class="cs">'+o.title+'</div></td>'
    +'<td class="cdl"><div class="dd" style="color:'+dc+'">'+o.dl+'</div><div class="dy" style="color:'+dc+'">'+dt+'</div></td>'
    +'</tr></table></div></div>';
}

function wCardH(it,o){
  var from=ST[it.stage]||{l:it.stage};
  return '<div class="wcard-wrap"><table class="wcard" width="100%"><tr>'
    +'<td class="wo">o</td>'
    +'<td class="wmain"><div class="wi">'+o.id+'</div><div class="wm">'+it.name+'</div><div class="wf">'+from.l+'</div></td>'
    +'<td class="wdl">'+o.dl+'</td>'
    +'</tr></table></div>';
}

function render(){
  var sd=ST[cur]||{l:cur};
  document.getElementById('stitle').innerHTML=sd.l.toUpperCase();
  var act=[],com=[];
  for(var i=0;i<IT.length;i++){var it=IT[i],o=getO(it.oid);if(isMine(it))act.push({it:it,o:o});else if(isComing(it))com.push({it:it,o:o});}
  act.sort(function(a,b){if(a.o.urg!==b.o.urg)return(b.o.urg?1:0)-(a.o.urg?1:0);return days(a.o.dl)-days(b.o.dl)});
  com.sort(function(a,b){return days(a.o.dl)-days(b.o.dl)});
  var all=[];
  for(var i=0;i<act.length;i++)all.push({t:'a',it:act[i].it,o:act[i].o,idx:i,first:i===0});
  if(act.length>0&&com.length>0)all.push({t:'d'});
  for(var i=0;i<com.length;i++)all.push({t:'c',it:com[i].it,o:com[i].o});
  var half=Math.ceil(all.length/2),L='',R='';
  for(var i=0;i<all.length;i++){
    var item=all[i],h='';
    if(item.t==='a')h=cardH(item.it,item.o,item.idx,item.first);
    else if(item.t==='d')h='<div class="divider">ОЖИДАЮТ</div>';
    else h=wCardH(item.it,item.o);
    if(i<half)L+=h;else R+=h;
  }
  if(all.length===0)L='<div style="color:#1E2235;text-align:center;padding:60px;font-size:18px">НЕТ ИЗДЕЛИЙ</div>';
  document.getElementById('col-left').innerHTML=L;
  document.getElementById('col-right').innerHTML=R;
}

function tick(){
  var n=new Date();
  document.getElementById('clock').innerHTML=n.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('xdate').innerHTML=n.toLocaleDateString('ru-RU',{weekday:'long',day:'numeric',month:'long'});
}
tick();render();setInterval(tick,1000);
</script>
</body>
</html>
