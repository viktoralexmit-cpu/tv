<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, initial-scale=1">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080A0F;color:#fff;font-family:'Courier New',monospace;width:1280px;overflow-x:hidden}

/* SWITCHER */
#sw{background:#0D0F18;border-bottom:2px solid #1A1D27;padding:7px 14px;width:1280px}
#sw table{border-collapse:collapse;width:100%}
#sw td{padding:0;vertical-align:middle;white-space:nowrap}
#sw td:first-child{color:#333;font-size:12px;padding-right:8px;width:50px}
.sb{background:#1A1D27;color:#555;border:none;border-radius:6px;padding:5px 13px;cursor:pointer;font-weight:700;font-size:12px;font-family:'Courier New',monospace;margin-right:5px}
.sb.on{background:#F7A84F;color:#000}

/* HEADER */
#hdr{width:1280px;padding:16px 28px 12px;border-bottom:1px solid #0F1118}
#hdr table{width:1224px;border-collapse:collapse}
#hdr table td{vertical-align:middle;padding:0}
#hdr table td:last-child{text-align:right}
#stitle{color:#F7A84F;font-size:44px;font-weight:900;letter-spacing:4px;line-height:1}
#ssub{color:#1A1D2A;font-size:12px;margin-top:4px;letter-spacing:3px}
#clock{color:#fff;font-size:56px;font-weight:900;line-height:1}
#xdate{color:#2A2D3A;font-size:12px;margin-top:3px}

/* TWO COLUMNS */
#cols{width:1280px;padding:10px 14px}
#cols table{width:1252px;border-collapse:collapse}
#cols table td{vertical-align:top;padding:0;width:626px}
#col-left{padding-right:8px !important;border-right:1px solid #141820}
#col-right{padding-left:8px !important}

/* ACTIVE CARD */
.card{width:100%;border-radius:11px;padding:12px 14px;margin-bottom:8px;position:relative}
.card.urg{background:#130A0A;border:2px solid #FF4444}
.card.top{background:#131720;border:1px solid #F7A84F33}
.card.nrm{background:#0F1118;border:1px solid #1A1D27}
.card table{width:100%;border-collapse:collapse}
.card table td{padding:0;vertical-align:middle}
.acc{position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:11px 0 0 11px}
.cnum{width:30px;text-align:center;color:#1A1D27;font-size:20px;font-weight:900;padding-left:6px}
.cbody{padding-left:6px}
.bu{background:#FF444422;color:#FF4444;border:1px solid #FF444455;border-radius:4px;padding:1px 7px;font-size:10px;font-weight:900;letter-spacing:1px;display:inline-block;margin-bottom:2px}
.ci{color:#F7A84F;font-size:18px;font-weight:900;line-height:1.1}
.cm{color:#fff;font-size:15px;font-weight:700;margin-top:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:360px}
.cs{color:#2A2D3A;font-size:11px;margin-top:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:360px}
.cdl{width:90px;text-align:right;padding-right:4px}
.dd{font-size:15px;font-weight:700}
.dy{font-size:11px;margin-top:1px}

/* DIVIDER */
.divider{width:100%;padding:5px 0;margin-bottom:6px;border-top:1px solid #0F1118;color:#141828;font-size:10px;letter-spacing:2px}

/* WAITING CARD */
.wcard{width:100%;border-radius:9px;padding:9px 12px;margin-bottom:7px;background:#080A0C;border:1px solid #0C0E14;opacity:0.6}
.wcard table{width:100%;border-collapse:collapse}
.wcard table td{padding:0;vertical-align:middle}
.wo{width:22px;color:#12141C;font-size:15px;text-align:center}
.wbody{padding-left:6px}
.wi{color:#181C28;font-size:13px;font-weight:700}
.wm{color:#111318;font-size:11px;margin-top:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:360px}
.wf{color:#0E1018;font-size:10px;margin-top:1px}
.wdl{width:76px;text-align:right;color:#111318;font-size:11px;padding-right:4px}

/* FOOTER */
#foot{width:1280px;padding:6px 24px;text-align:right}
.dot{display:inline-block;width:7px;height:7px;border-radius:4px;background:#4FC9A4;margin-right:5px;vertical-align:middle}
</style>
</head>
<body>

<div id="sw">
  <table><tr>
    <td>ЭТАП:</td>
    <td>
      <button class="sb on" onclick="go('saw',this)">🪚 Распиловка</button>
      <button class="sb" onclick="go('edge',this)">⚙️ Кантовка</button>
      <button class="sb" onclick="go('cnc',this)">🤖 ЧПУ</button>
      <button class="sb" onclick="go('paint',this)">🎨 Малярка</button>
      <button class="sb" onclick="go('assembly',this)">🔧 Сборка</button>
      <button class="sb" onclick="go('packaging',this)">📦 Упаковка</button>
    </td>
  </tr></table>
</div>

<div id="hdr">
  <table><tr>
    <td><div id="stitle"></div><div id="ssub">ОЧЕРЕДЬ ИЗДЕЛИЙ</div></td>
    <td><div id="clock"></div><div id="xdate"></div></td>
  </tr></table>
</div>

<div id="cols">
  <table><tr>
    <td id="col-left" valign="top"></td>
    <td id="col-right" valign="top"></td>
  </tr></table>
</div>

<div id="foot"><span class="dot"></span><span style="color:#151A20;font-size:10px;letter-spacing:2px;vertical-align:middle">MEBEL PRO · LIVE</span></div>

<script>
var ST={office:{l:'Офис',i:'📋'},constructor:{l:'Конструктор',i:'📐'},saw:{l:'Распиловка',i:'🪚'},edge:{l:'Кантовка',i:'⚙️'},cnc:{l:'ЧПУ',i:'🤖'},paint_after_saw:{l:'Малярка',i:'🎨'},paint_after_cnc:{l:'Малярка',i:'🎨'},assembly:{l:'Сборка',i:'🔧'},packaging:{l:'Упаковка',i:'📦'},installer:{l:'Установка',i:'🏠'},done:{l:'Готово',i:'✅'}};
var SO=['office','constructor','saw','paint_after_saw','edge','cnc','paint_after_cnc','assembly','packaging','installer','done'];
var OR=[
  {id:'ORD-2026-001',title:'Кухонный гарнитур + шкаф-купе',client:'OÜ Kodu Design',dl:'2026-05-10',urg:true},
  {id:'ORD-2026-002',title:'Офисные перегородки',client:'Тимур Берг',dl:'2026-05-20',urg:false},
  {id:'ORD-2026-003',title:'Стеллажи — 12 секций',client:'AS Puidutöö',dl:'2026-05-05',urg:false},
  {id:'ORD-2026-004',title:'Гардеробная система',client:'Елена Сидорова',dl:'2026-05-12',urg:false},
  {id:'ORD-2026-005',title:'Детская мебель',client:'Семья Коваль',dl:'2026-05-03',urg:true}
];
var IT=[
  {id:'i1',oid:'ORD-2026-001',name:'Кухонный гарнитур нижний',stage:'saw'},
  {id:'i2',oid:'ORD-2026-001',name:'Шкаф-купе',stage:'saw'},
  {id:'i3',oid:'ORD-2026-002',name:'Перегородка секция A',stage:'constructor'},
  {id:'i4',oid:'ORD-2026-002',name:'Перегородка секция B',stage:'constructor'},
  {id:'i5',oid:'ORD-2026-003',name:'Стеллаж секции 1–4',stage:'constructor'},
  {id:'i6',oid:'ORD-2026-003',name:'Стеллаж секции 5–8',stage:'cnc'},
  {id:'i7',oid:'ORD-2026-003',name:'Стеллаж секции 9–12',stage:'assembly'},
  {id:'i8',oid:'ORD-2026-004',name:'Боковые секции',stage:'saw'},
  {id:'i9',oid:'ORD-2026-004',name:'Штанги и полки',stage:'constructor'},
  {id:'i10',oid:'ORD-2026-005',name:'Кровать детская',stage:'saw'},
  {id:'i11',oid:'ORD-2026-005',name:'Шкаф детский',stage:'office'}
];
var cur='saw';
function getO(id){for(var i=0;i<OR.length;i++)if(OR[i].id===id)return OR[i];return{title:'',client:'',dl:'',urg:false}}
function days(d){return Math.ceil((new Date(d)-new Date())/86400000)}
function isMine(it){return cur==='paint'?(it.stage==='paint_after_saw'||it.stage==='paint_after_cnc'):it.stage===cur}
function isComing(it){if(it.stage==='done'||isMine(it))return false;var mi=SO.indexOf(cur==='paint'?'paint_after_saw':cur),ci=SO.indexOf(it.stage);return mi>ci&&mi!==-1}
function go(s,btn){cur=s;var bs=document.querySelectorAll('.sb');for(var i=0;i<bs.length;i++)bs[i].className='sb';btn.className='sb on';render()}

function cardH(it,o,idx,isFirst){
  var d=days(o.dl),dc=d<0?'#FF4444':d<=3?'#FF8C00':'#4FC9A4',dt=d<0?'просрочено':d===0?'сегодня':d+' дн.';
  var ac=o.urg?'#FF4444':isFirst?'#F7A84F':'#1F2235';
  var cls='card '+(o.urg?'urg':isFirst?'top':'nrm');
  var num=o.urg?'⚡':(idx===0?'▶':'#'+(idx+1));
  return '<div class="'+cls+'"><div class="acc" style="background:'+ac+'"></div>'
    +'<table><tr>'
    +'<td class="cnum">'+num+'</td>'
    +'<td class="cbody">'+(o.urg?'<div class="bu">⚡ СРОЧНО</div>':'')+'<div class="ci">'+o.id+'</div><div class="cm">'+it.name+'</div><div class="cs">'+o.title+'</div></td>'
    +'<td class="cdl"><div class="dd" style="color:'+dc+'">'+o.dl+'</div><div class="dy" style="color:'+dc+'">'+dt+'</div></td>'
    +'</tr></table></div>';
}

function wCardH(it,o){
  var from=ST[it.stage]||{i:'❓',l:it.stage};
  return '<div class="wcard"><table><tr>'
    +'<td class="wo">○</td>'
    +'<td class="wbody"><div class="wi">'+o.id+'</div><div class="wm">'+it.name+'</div><div class="wf">'+from.i+' '+from.l+'</div></td>'
    +'<td class="wdl">'+o.dl+'</td>'
    +'</tr></table></div>';
}

function render(){
  var sd=ST[cur]||{l:cur,i:'📺'};
  document.getElementById('stitle').innerHTML=sd.i+' '+sd.l.toUpperCase();
  var act=[],com=[];
  for(var i=0;i<IT.length;i++){var it=IT[i],o=getO(it.oid);if(isMine(it))act.push({it:it,o:o});else if(isComing(it))com.push({it:it,o:o});}
  act.sort(function(a,b){if(a.o.urg!==b.o.urg)return(b.o.urg?1:0)-(a.o.urg?1:0);return days(a.o.dl)-days(b.o.dl)});
  com.sort(function(a,b){return days(a.o.dl)-days(b.o.dl)});

  var all=[];
  for(var i=0;i<act.length;i++)all.push({type:'act',it:act[i].it,o:act[i].o,idx:i,first:i===0});
  if(com.length>0)all.push({type:'div'});
  for(var i=0;i<com.length;i++)all.push({type:'com',it:com[i].it,o:com[i].o});

  var half=Math.ceil(all.length/2);
  var L='',R='';
  for(var i=0;i<all.length;i++){
    var item=all[i],h='';
    if(item.type==='act') h=cardH(item.it,item.o,item.idx,item.first);
    else if(item.type==='div') h='<div class="divider">⏳ ОЖИДАЮТ</div>';
    else if(item.type==='com') h=wCardH(item.it,item.o);
    if(i<half) L+=h; else R+=h;
  }
  if(all.length===0){L='<div style="color:#1E2235;padding:60px 20px;font-size:20px;text-align:center">✓ НЕТ ИЗДЕЛИЙ</div>';R='';}
  document.getElementById('col-left').innerHTML=L;
  document.getElementById('col-right').innerHTML=R;
}

function tick(){
  var n=new Date();
  document.getElementById('clock').innerHTML=n.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('xdate').innerHTML=n.toLocaleDateString('ru-RU',{weekday:'long',day:'numeric',month:'long'});
}
tick();render();setInterval(tick,1000);
</script>
</body>
</html>
