<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080A0F;color:#fff;font-family:'Courier New',monospace;width:1280px;min-height:720px}
#sw{background:#0D0F18;border-bottom:2px solid #1A1D27;padding:8px 16px;overflow:hidden}
#sw span{color:#333;font-size:13px;margin-right:6px;float:left;line-height:30px}
.sb{background:#1A1D27;color:#555;border:none;border-radius:6px;padding:5px 14px;cursor:pointer;font-weight:700;font-size:13px;font-family:'Courier New',monospace;float:left;margin-right:6px;height:30px}
.sb.on{background:#F7A84F;color:#000}
#sw:after{content:'';display:table;clear:both}

#hdr{padding:18px 28px 14px;overflow:hidden;border-bottom:1px solid #0F1118}
#stitle{color:#F7A84F;font-size:46px;font-weight:900;letter-spacing:4px;float:left}
#ssub{color:#1A1D2A;font-size:12px;margin-top:6px;letter-spacing:3px;clear:left}
#clockbox{float:right;text-align:right}
#clock{color:#fff;font-size:58px;font-weight:900;line-height:1}
#xdate{color:#2A2D3A;font-size:12px;margin-top:3px}
#hdr:after{content:'';display:table;clear:both}

#cols{padding:12px 16px;overflow:hidden}
#col-left{float:left;width:620px;padding-right:10px;border-right:1px solid #141820}
#col-right{float:right;width:620px;padding-left:10px}

.card{border-radius:12px;padding:14px 16px;margin-bottom:9px;overflow:hidden;position:relative}
.card.urg{background:#130A0A;border:2px solid #FF444466}
.card.nrm{background:#0F1118;border:1px solid #1A1D27}
.card.top{background:#131720;border:1px solid #F7A84F22}
.acc{position:absolute;left:0;top:0;bottom:0;width:4px}
.cnum{float:left;font-size:22px;color:#1A1D27;font-weight:900;width:32px;text-align:center;padding-top:2px}
.cbody{margin-left:42px;margin-right:90px}
.bu{background:#FF444422;color:#FF4444;border:1px solid #FF444455;border-radius:4px;padding:1px 7px;font-size:11px;font-weight:900;display:inline-block;margin-bottom:3px;letter-spacing:1px}
.ci{color:#F7A84F;font-size:19px;font-weight:900;line-height:1.1}
.cm{color:#fff;font-size:16px;font-weight:700;margin-top:3px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.cs{color:#2A2D3A;font-size:11px;margin-top:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.cdl{position:absolute;right:14px;top:50%;margin-top:-20px;text-align:right;width:82px}
.dd{font-size:15px;font-weight:700}
.dy{font-size:11px;margin-top:1px}
.card:after{content:'';display:table;clear:both}

.divider{border-top:1px solid #0F1118;margin:6px 0 8px;overflow:hidden}
.divider span{color:#141828;font-size:10px;letter-spacing:2px;float:left;margin-top:-8px;background:#080A0F;padding:0 8px}

.wcard{background:#080A0C;border:1px solid #0C0E14;border-radius:10px;padding:10px 14px;margin-bottom:7px;overflow:hidden;opacity:0.6}
.wo{float:left;color:#12141C;font-size:16px;width:24px;text-align:center}
.wbody{margin-left:34px;margin-right:76px}
.wi{color:#181C28;font-size:14px;font-weight:700}
.wm{color:#111318;font-size:12px;margin-top:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.wf{color:#0E1018;font-size:10px;margin-top:1px}
.wdl{position:absolute;right:14px;top:50%;margin-top:-10px;color:#111318;font-size:11px;text-align:right}
.wcard{position:relative}
.wcard:after{content:'';display:table;clear:both}

#foot{padding:6px 24px;text-align:right;clear:both}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#4FC9A4;margin-right:6px;vertical-align:middle}
#fl{color:#151A20;font-size:10px;letter-spacing:2px;vertical-align:middle}
</style>
</head>
<body>

<div id="sw">
  <span>ЭТАП:</span>
  <button class="sb on" onclick="go('saw',this)">🪚 Распиловка</button>
  <button class="sb" onclick="go('edge',this)">⚙️ Кантовка</button>
  <button class="sb" onclick="go('cnc',this)">🤖 ЧПУ</button>
  <button class="sb" onclick="go('paint',this)">🎨 Малярка</button>
  <button class="sb" onclick="go('assembly',this)">🔧 Сборка</button>
  <button class="sb" onclick="go('packaging',this)">📦 Упаковка</button>
</div>

<div id="hdr">
  <div id="clockbox"><div id="clock"></div><div id="xdate"></div></div>
  <div id="stitle"></div>
  <div id="ssub">ОЧЕРЕДЬ ИЗДЕЛИЙ</div>
</div>

<div id="cols">
  <div id="col-left"></div>
  <div id="col-right"></div>
</div>

<div id="foot"><span class="dot"></span><span id="fl">MEBEL PRO · LIVE</span></div>

<script>
var ST={office:{l:'Офис',i:'📋'},constructor:{l:'Конструктор',i:'📐'},saw:{l:'Распиловка',i:'🪚'},edge:{l:'Кантовка',i:'⚙️'},cnc:{l:'ЧПУ',i:'🤖'},paint_after_saw:{l:'Малярка',i:'🎨'},paint_after_cnc:{l:'Малярка',i:'🎨'},assembly:{l:'Сборка',i:'🔧'},packaging:{l:'Упаковка',i:'📦'},installer:{l:'Установка',i:'🏠'},done:{l:'Готово',i:'✅'}};
var SO=['office','constructor','saw','paint_after_saw','edge','cnc','paint_after_cnc','assembly','packaging','installer','done'];
var OR=[
  {id:'ORD-2026-001',title:'Кухонный гарнитур + шкаф-купе',client:'OÜ Kodu Design',dl:'2026-05-10',urg:true},
  {id:'ORD-2026-002',title:'Офисные перегородки',client:'Тимур Берг',dl:'2026-05-20',urg:false},
  {id:'ORD-2026-003',title:'Стеллажи — 12 секций',client:'AS Puidutöö',dl:'2026-05-05',urg:false},
  {id:'ORD-2026-004',title:'Гардеробная система',client:'Елена Сидорова',dl:'2026-05-12',urg:false},
  {id:'ORD-2026-005',title:'Детская мебель',client:'Семья Коваль',dl:'2026-05-03',urg:true}
];
var IT=[
  {id:'i1',oid:'ORD-2026-001',name:'Кухонный гарнитур нижний',stage:'saw'},
  {id:'i2',oid:'ORD-2026-001',name:'Шкаф-купе',stage:'saw'},
  {id:'i3',oid:'ORD-2026-002',name:'Перегородка секция A',stage:'constructor'},
  {id:'i4',oid:'ORD-2026-002',name:'Перегородка секция B',stage:'constructor'},
  {id:'i5',oid:'ORD-2026-003',name:'Стеллаж секции 1–4',stage:'constructor'},
  {id:'i6',oid:'ORD-2026-003',name:'Стеллаж секции 5–8',stage:'cnc'},
  {id:'i7',oid:'ORD-2026-003',name:'Стеллаж секции 9–12',stage:'assembly'},
  {id:'i8',oid:'ORD-2026-004',name:'Боковые секции',stage:'saw'},
  {id:'i9',oid:'ORD-2026-004',name:'Штанги и полки',stage:'constructor'},
  {id:'i10',oid:'ORD-2026-005',name:'Кровать детская',stage:'saw'},
  {id:'i11',oid:'ORD-2026-005',name:'Шкаф детский',stage:'office'}
];
var cur='saw';
function getO(id){for(var i=0;i<OR.length;i++)if(OR[i].id===id)return OR[i];return{title:'',client:'',dl:'',urg:false}}
function days(d){return Math.ceil((new Date(d)-new Date())/86400000)}
function isMine(it){return cur==='paint'?(it.stage==='paint_after_saw'||it.stage==='paint_after_cnc'):it.stage===cur}
function isComing(it){if(it.stage==='done'||isMine(it))return false;var mi=SO.indexOf(cur==='paint'?'paint_after_saw':cur),ci=SO.indexOf(it.stage);return mi>ci&&mi!==-1}
function go(s,btn){cur=s;var bs=document.querySelectorAll('.sb');for(var i=0;i<bs.length;i++)bs[i].className='sb';btn.className='sb on';render()}
function cardHTML(it,o,i,isFirst){
  var d=days(o.dl);
  var dc=d<0?'#FF4444':d<=3?'#FF8C00':'#4FC9A4';
  var dt=d<0?'просрочено':d===0?'сегодня':d+' дн.';
  var ac=o.urg?'#FF4444':isFirst?'#F7A84F':'#1F2235';
  var cls='card '+(o.urg?'urg':isFirst?'top':'nrm');
  var num=o.urg?'⚡':(i===0?'▶':'#'+(i+1));
  return '<div class="'+cls+'"><div class="acc" style="background:'+ac+'"></div><div class="cnum">'+num+'</div><div class="cbody">'+(o.urg?'<div class="bu">⚡ СРОЧНО</div>':'')+'<div class="ci">'+o.id+'</div><div class="cm">'+it.name+'</div><div class="cs">'+o.title+'</div></div><div class="cdl"><div class="dd" style="color:'+dc+'">'+o.dl+'</div><div class="dy" style="color:'+dc+'">'+dt+'</div></div></div>';
}
function wCardHTML(it,o){
  var from=ST[it.stage]||{i:'❓',l:it.stage};
  return '<div class="wcard"><div class="wo">○</div><div class="wbody"><div class="wi">'+o.id+'</div><div class="wm">'+it.name+'</div><div class="wf">'+from.i+' '+from.l+'</div></div><div class="wdl">'+o.dl+'</div></div>';
}
function render(){
  var sd=ST[cur]||{l:cur,i:'📺'};
  document.getElementById('stitle').innerHTML=sd.i+' '+sd.l.toUpperCase();
  var act=[],com=[];
  for(var i=0;i<IT.length;i++){var it=IT[i],o=getO(it.oid);if(isMine(it))act.push({it:it,o:o});else if(isComing(it))com.push({it:it,o:o});}
  act.sort(function(a,b){if(a.o.urg!==b.o.urg)return(b.o.urg?1:0)-(a.o.urg?1:0);return days(a.o.dl)-days(b.o.dl)});
  com.sort(function(a,b){return days(a.o.dl)-days(b.o.dl)});
  // merge into one list: active then waiting
  var all=[];
  for(var i=0;i<act.length;i++)all.push({type:'act',x:act[i],i:i,first:i===0});
  if(com.length>0)all.push({type:'div'});
  for(var i=0;i<com.length;i++)all.push({type:'com',x:com[i]});
  // split into two columns
  var half=Math.ceil(all.length/2);
  var left='',right='';
  for(var i=0;i<all.length;i++){
    var item=all[i];
    var h='';
    if(item.type==='act') h=cardHTML(item.x.it,item.x.o,item.i,item.first);
    else if(item.type==='div') h='<div class="divider"><span>⏳ ОЖИДАЮТ</span></div>';
    else if(item.type==='com') h=wCardHTML(item.x.it,item.x.o);
    if(i<half) left+=h; else right+=h;
  }
  if(all.length===0){left='<div style="color:#1E2235;text-align:center;padding:60px 20px;font-size:20px">✓ НЕТ ИЗДЕЛИЙ</div>';right='';}
  document.getElementById('col-left').innerHTML=left;
  document.getElementById('col-right').innerHTML=right;
}
function tick(){
  var n=new Date();
  document.getElementById('clock').innerHTML=n.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('xdate').innerHTML=n.toLocaleDateString('ru-RU',{weekday:'long',day:'numeric',month:'long'});
}
tick();render();setInterval(tick,1000);
</script>
</body>
</html>
